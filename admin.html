<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System | SBOMALPITIYA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- Video background inherited from style.css -->
    <div class="video-container">
        <video autoplay muted loop playsinline class="bg-video">
            <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-network-of-neurons-31291-large.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <nav class="glass-nav" style="margin: 2rem 5%;">
        <div class="logo">SB. <span style="font-size: 1rem; color: var(--primary-color);">// ADMIN TERMINAL</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Return to Public Site</a></li>
        </ul>
    </nav>

    <main class="admin-container">
        
        <!-- Auth View -->
        <div id="auth-view" class="admin-card glass-panel">
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active">Login</button>
                <button id="tab-signup" class="auth-tab">Sign Up</button>
            </div>
            
            <form id="auth-form" class="auth-form">
                <h2 id="auth-title">System Authentication</h2>
                
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" required autocomplete="off" placeholder="sys_admin">
                </div>
                
                <div class="input-group">
                    <label>Passcode</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 1.5rem;" id="auth-submit">Initialize Session</button>
                <div id="auth-error" class="error-msg"></div>
            </form>
        </div>

        <!-- Dashboard View (hidden initially) -->
        <div id="dashboard-view" class="admin-card glass-panel hidden" style="max-width: 800px; width: 100%;">
            <div class="dashboard-header">
                <h2>Media Uplink System</h2>
                <button id="btn-logout" class="btn btn-secondary" style="padding: 0.5rem 1.5rem; font-size: 0.9rem;">Disconnect</button>
            </div>
            
            <form id="upload-form" class="upload-form">
                <div class="input-group">
                    <label>Media Title</label>
                    <input type="text" id="media-title" required placeholder="e.g. NextGen Neural Network UI">
                </div>
                
                <div class="input-group">
                    <label>Media Category</label>
                    <select id="media-type">
                        <option value="image">High-Res Photo / Image</option>
                        <option value="video">Video (YouTube URL)</option>
                    </select>
                </div>

                <div class="input-group" id="file-input-group">
                    <label>Upload Image File</label>
                    <!-- Simulated local upload -->
                    <input type="file" id="media-file" accept="image/*">
                    <small>For demo purposes, images are converted and stored locally.</small>
                </div>

                <div class="input-group hidden" id="url-input-group">
                    <label>YouTube/Video Link</label>
                    <input type="url" id="media-url" placeholder="https://www.youtube.com/watch?v=...">
                </div>
                
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">Upload to Gallery</button>
                <div id="upload-msg" style="margin-top: 1rem; text-align: center; color: var(--primary-color);"></div>
            </form>

            <div class="current-media">
                <h3>Current Database Records</h3>
                <ul id="admin-media-list" class="admin-media-list">
                    <!-- populated via js -->
                </ul>
            </div>
        </div>

    </main>

    <script src="admin.js"></script>
</body>
</html>
